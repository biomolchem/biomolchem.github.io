<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sensor</title>
</head>

<body>
<table>
  <tr>
    <td><h3>Server load average (updated every 10 min)</h3>


<iframe width="450" height="260" style="border: 1px solid #cccccc;" src="https://thingspeak.com/channels/477411/charts/3?bgcolor=%23ffffff&color=%23d62020&days=4&dynamic=true&results=8000&title=Load+Average+Public&type=line&yaxismax=2&yaxismin=0"></iframe>

    <td><h3>Server overall temperature (updated every 10 min)</h3>
<iframe width="450" height="260" style="border: 1px solid #cccccc;" src="https://thingspeak.com/channels/477411/charts/1?bgcolor=%23ffffff&color=%23d62020&days=4&dynamic=false&results=8000&title=server+overall+temp&type=line&yaxis=%C2%B0C"></iframe></td>
  </tr>
  <tr>
    <td>
<h3>Server RAM usage (updated every 10 min)</h3>


<iframe width="450" height="260" style="border: 1px solid #cccccc;" src="https://thingspeak.com/channels/477411/charts/5?bgcolor=%23ffffff&color=%23d62020&days=4&dynamic=true&results=8000&title=Used+RAM+%25&type=line"></iframe>


</td>
    <td><h3>Cold room or MS room Temperature (updated every 5 minutes)</h3>
<iframe width="450" height="260" style="border: 1px solid #cccccc;" src="https://thingspeak.com/channels/481500/charts/1?bgcolor=%23ffffff&color=%23d62020&days=3&dynamic=true&results=3600&title=Temperature+last+3+days&type=line&xaxis=Time%2Fdate&yaxis=%C2%B0C"></iframe></td>
  </tr>
</table>
